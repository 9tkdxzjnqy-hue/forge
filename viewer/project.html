<!-- Project artefact viewer · open via ?id=forge-knowledge-browser or ?id=wc-sim-market -->
<!-- Optional deep-link: ?artefact=[artefact-id] selects a specific artefact on load    -->
<!-- Serve with: ./forge serve from the forge root                                       -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Forge · Project</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="forge-styles.css?v=2" />
<link rel="stylesheet" href="forge-tweaks.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="forge-config.js"></script>
<script src="forge-md.js"></script>
<script src="v2/running-brief-parser.js"></script>
<script type="text/babel" src="artefacts/artefact-md.jsx"></script>
<script type="text/babel" src="v2/timeline.jsx"></script>
<script type="text/babel" src="v2/pipeline.jsx"></script>

<script type="text/babel" data-presets="react">

  // ── Running-brief renderer ────────────────────────────────────────────────
  // Fetches the markdown, parses the handoff log + pipeline config sections,
  // and renders them with HandoffTimeline and PipelineMap. Other sections fall
  // back to the standard Block renderer from artefact-md.jsx.
  function RunningBriefPage({ src }) {
    const [data, setData] = React.useState(null);
    const [error, setError] = React.useState(null);

    React.useEffect(() => {
      if (!src) { setError('no src'); return; }
      fetch(src).then(r => {
        if (!r.ok) throw new Error(`${r.status}`);
        return r.text();
      }).then(md => {
        const tree = window.ForgeMd.parseMd(md);
        const entries = window.ForgeRunningBriefParser.parseHandoffLog(md);
        const pipelineData = window.ForgeRunningBriefParser.parsePipelineConfig(md);
        setData({ tree, entries, pipelineData });
      }).catch(e => setError(e.message));
    }, [src]);

    if (error) {
      return (
        <main className="fg-main" style={{ padding: 32 }}>
          <div style={{ color: 'var(--fg-ink-soft)', fontFamily: 'var(--fg-mono)', fontSize: 12 }}>
            Could not load {src}: {error}
          </div>
        </main>
      );
    }
    if (!data) {
      return (
        <main className="fg-main" style={{ padding: 32 }}>
          <div style={{ color: 'var(--fg-ink-soft)', fontFamily: 'var(--fg-mono)', fontSize: 12 }}>
            loading running brief…
          </div>
        </main>
      );
    }

    const { tree, entries, pipelineData } = data;
    const fm = tree.frontmatter;

    return (
      <main className="fg-main">
        {/* Standard header */}
        <div className="fg-header">
          <div className="fg-header__crumbs">
            <span className="fg-header__path">{fm.file}</span>
            <span className="fg-header__sep">·</span>
            <span className="fg-pill">{fm.phase ? fm.phase[0].toUpperCase() + fm.phase.slice(1) : ''}</span>
            <span className="fg-header__sep">·</span>
            <span className="fg-header__mode">{fm.status}</span>
          </div>
          <div className="fg-header__title-row">
            <span className="fg-header__n" style={{ background: '#f0f0ee', color: 'var(--fg-ink-3)' }}>rb</span>
            <h1 className="fg-header__h1">{fm.title}</h1>
            <span className="fg-header__role">running brief · live pipeline state</span>
          </div>
          {fm.tagline && <p className="fg-header__summary">{fm.tagline}</p>}
          {fm.stats && fm.stats.length > 0 && (
            <div className="fg-header__stats" style={{ '--fg-stat-cols': fm.stats.length }}>
              {fm.stats.map((s, i) => (
                <div key={i} className="fg-stat">
                  <div className="fg-stat__k">{s.k}</div>
                  <div className={`fg-stat__v${s.phase ? ' fg-stat__v--phase' : ''}`}>{s.v}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Sections: pipeline config and handoff log get custom renderers */}
        {tree.sections.map((s, i) => {
          const titleLower = s.title.toLowerCase();

          if (titleLower === 'pipeline configuration') {
            return (
              <section key={i} className="fg-card">
                <div className="fg-card__head">
                  <h2 className="fg-card__title">{s.title}</h2>
                </div>
                <div className="fg-card__body">
                  {pipelineData
                    ? <PipelineMap data={pipelineData} />
                    : <pre style={{ fontFamily: 'var(--fg-mono)', fontSize: 12, whiteSpace: 'pre-wrap' }}>
                        {s.blocks.filter(b => b.kind === 'code').map(b => b.text).join('\n')}
                      </pre>
                  }
                </div>
              </section>
            );
          }

          if (titleLower === 'handoff log') {
            return (
              <section key={i} className="fg-card">
                <div className="fg-card__head">
                  <h2 className="fg-card__title">{s.title}</h2>
                  <span className="fg-card__eyebrow">newest at top · each entry is one agent handoff</span>
                </div>
                <div className="fg-card__body">
                  <HandoffTimeline entries={entries} />
                </div>
              </section>
            );
          }

          // Generic section — standard block renderer
          return (
            <section key={i} className="fg-card">
              <div className="fg-card__head">
                <h2 className="fg-card__title">{s.title}</h2>
              </div>
              <div className="fg-card__body fg-stack">
                {s.blocks.map((b, j) => {
                  // Inline block renderer (subset used by running-brief)
                  if (b.kind === 'p') {
                    return <p key={j} className="fg-card__p">{b.text}</p>;
                  }
                  if (b.kind === 'list') {
                    return (
                      <ul key={j} className="fg-stack fg-stack--gap-s" style={{ listStyle: 'none', padding: 0, margin: 0 }}>
                        {b.items.map((it, k) => (
                          <li key={k} className="fg-step">
                            <span className="fg-step__n" style={{ background: 'var(--fg-ink-soft)' }}>·</span>
                            <div style={{ fontSize: 13.5, color: 'var(--fg-ink-1)', lineHeight: 1.55 }}>{it}</div>
                          </li>
                        ))}
                      </ul>
                    );
                  }
                  if (b.kind === 'code') {
                    return (
                      <pre key={j} style={{
                        fontFamily: 'var(--fg-mono)', fontSize: 12, lineHeight: 1.6,
                        background: 'rgba(0,0,0,0.04)', border: '1px solid var(--fg-line-soft)',
                        borderRadius: 6, padding: '12px 16px', overflowX: 'auto',
                        whiteSpace: 'pre-wrap', color: 'var(--fg-ink-1)',
                      }}><code>{b.text}</code></pre>
                    );
                  }
                  if (b.kind === 'h3') {
                    return <h3 key={j} style={{ fontSize: 13, fontWeight: 600, color: 'var(--fg-ink-1)', margin: '16px 0 6px' }}>{b.text}</h3>;
                  }
                  return null;
                })}
              </div>
            </section>
          );
        })}
      </main>
    );
  }

  // Artefact types that are synthesised documents (shown in the top rail group)
  const SYNTHESISED_TYPES = new Set([
    'brief', 'running-brief', 'personas', 'research-plan',
    'handoff', 'refinement-output', 'build-kickoff',
    'assumption-log', 'breadboard', 'ost-decisions',
  ]);

  function ProjectRail({ project, activeId, onSelect }) {
    const synthesised = project.artefacts.filter(a => SYNTHESISED_TYPES.has(a.type || ''));
    const agentOutputs = project.artefacts.filter(a => !SYNTHESISED_TYPES.has(a.type || ''));
    const groups = [
      { label: 'synthesised', items: synthesised },
      { label: 'agent outputs', items: agentOutputs },
    ].filter(g => g.items.length > 0);

    return (
      <aside className="fg-dir">
        <div className="fg-dir__head">
          <div className="fg-dir__brand">
            <span className="fg-dir__mark">◆</span> {project.name}
            <span className="fg-dir__ver">project</span>
          </div>
        </div>
        {groups.map(g => (
          <div key={g.label} className="fg-dir__group">
            <div className="fg-dir__group-head">
              <span className="fg-dir__group-label">{g.label}</span>
              <span className="fg-dir__group-count">{g.items.length}</span>
            </div>
            {g.items.map(a => (
              <div key={a.id} data-phase={a.phase}
                   className={`fg-dir__item${a.id === activeId ? ' fg-dir__item--active' : ''}`}
                   style={{cursor:'pointer'}}
                   onClick={() => onSelect(a.id)}>
                <span className="fg-dir__n">{a.n}</span>
                <div style={{flex:1, minWidth:0}}>
                  <div className="fg-dir__name">{a.name}</div>
                  <div className="fg-dir__sub">{a.file.split('/').pop()}</div>
                </div>
              </div>
            ))}
          </div>
        ))}
        <div className="fg-dir__group" style={{marginTop:'auto', paddingTop:12}}>
          <a href="agents.html"
             style={{display:'flex', alignItems:'center', gap:8, padding:'8px 16px',
                     fontSize:11.5, color:'var(--fg-ink-soft)', fontFamily:'var(--fg-mono)',
                     textDecoration:'none'}}>
            ← Forge agents
          </a>
        </div>
      </aside>
    );
  }

  function App() {
    const params  = new URLSearchParams(window.location.search);
    const projectId      = params.get('id');
    const deepArtefactId = params.get('artefact');

    const [project,    setProject]    = React.useState(null);
    const [selectedId, setSelectedId] = React.useState(null);
    const [loadError,  setLoadError]  = React.useState(null);
    const firstLoad = React.useRef(true);

    const loadManifest = React.useCallback(() => {
      fetch('../output/manifest.json', { cache: 'no-store' })
        .then(r => {
          if (!r.ok) throw new Error(`manifest fetch failed: ${r.status}`);
          return r.json();
        })
        .then(manifest => {
          const proj = projectId
            ? manifest.projects.find(p => p.id === projectId)
            : manifest.projects[0];

          if (!proj) {
            setLoadError(
              projectId
                ? `Project "${projectId}" not found in manifest.`
                : 'No projects in manifest. Run ./forge serve to generate it.'
            );
            return;
          }

          setProject(proj);

          if (firstLoad.current) {
            firstLoad.current = false;
            // Deep-link ?artefact= takes priority; otherwise default to last artefact
            const deepMatch = deepArtefactId && proj.artefacts.find(a => a.id === deepArtefactId);
            const initId = deepMatch
              ? deepArtefactId
              : proj.artefacts[proj.artefacts.length - 1]?.id;
            setSelectedId(initId || null);
          }
          // On subsequent polls: don't reset selection — only the artefact list updates
        })
        .catch(() => {
          // Poll failure: keep existing project data, only error on first load
          if (firstLoad.current) {
            setLoadError('Could not load output/manifest.json. Is ./forge serve running?');
          }
        });
    }, [projectId, deepArtefactId]);

    React.useEffect(() => {
      loadManifest();
      const timer = setInterval(loadManifest, 30000);
      return () => clearInterval(timer);
    }, [loadManifest]);

    if (loadError) {
      return (
        <div style={{padding:40, fontFamily:'var(--fg-mono)', color:'var(--fg-ink-soft)'}}>
          {loadError}
        </div>
      );
    }

    if (!project || !selectedId) {
      return (
        <div style={{padding:40, fontFamily:'var(--fg-mono)', color:'var(--fg-ink-soft)'}}>
          Loading…
        </div>
      );
    }

    const artefact = project.artefacts.find(a => a.id === selectedId)
      || project.artefacts[project.artefacts.length - 1];

    const isRunningBrief = artefact?.type === 'running-brief';

    return (
      <div className="fg-root" data-phase={artefact?.phase || 'discovery'} style={{minHeight:'100%'}}>
        <div className="fg-shell">
          <ProjectRail project={project} activeId={selectedId} onSelect={setSelectedId} />
          {isRunningBrief
            ? <RunningBriefPage src={`../${artefact.file}`} />
            : <ArtefactMdPage src={`../${artefact.file}`} embedded={true} />
          }
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
