<!-- Serve with: python3 -m http.server 8080 from the forge root, then open http://localhost:8080/viewer/ -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Forge · Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="forge-styles.css" />
<link rel="stylesheet" href="forge-tweaks.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  * { box-sizing: border-box; }
  .artboard-host { width: 100%; min-height: 100%; }
</style>
</head>
<body>
<div id="root"></div>
<div id="tweaks-root"></div>

<script>
  // Initial tweak values — host rewrites this block on each setTweak.
  window.FORGE_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "voice": "crisp",
    "chroma": "default",
    "surface": "card"
  }/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="forge-config.js"></script>
<script src="forge-md.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="artefacts/agent-md.jsx"></script>
<script type="text/babel" src="artefacts/artefact-md.jsx"></script>
<script type="text/babel" src="artefacts/dashboard.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="forge-tweaks.jsx"></script>

<script type="text/babel" data-presets="react">
  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="forge-agents"
          title="Forge · Agent reference pages"
          subtitle="Each artboard reads a .md source under output/agents/ and renders it through the Forge design system. Edit the .md, reload — the page reflects it.">
          <DCArtboard
            id="agent-pm-agent-md"
            label="Agent reference · 01 · The Interrogator (conversation)"
            width={1320} height={2400}>
            <div className="artboard-host">
              <AgentMdPage src="../output/agents/01-pm-agent.md" />
            </div>
          </DCArtboard>
          <DCArtboard
            id="agent-synthesis-md"
            label="Agent reference · 06 · Synthesis (autonomous)"
            width={1320} height={2400}>
            <div className="artboard-host">
              <AgentMdPage src="../output/agents/06-synthesis.md" />
            </div>
          </DCArtboard>
          <DCArtboard
            id="agent-observer-md"
            label="Agent reference · ·· The Observer (always-on, framework-level)"
            width={1320} height={2000}>
            <div className="artboard-host">
              <AgentMdPage src="../output/agents/observer.md" />
            </div>
          </DCArtboard>
          <DCArtboard
            id="agent-arbiter-md"
            label="Agent reference · ·· The Arbiter (triggered)"
            width={1320} height={2000}>
            <div className="artboard-host">
              <AgentMdPage src="../output/agents/arbiter.md" />
            </div>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
